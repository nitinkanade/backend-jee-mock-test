<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>JEE Paper Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script>
window.MathJax = { tex: { inlineMath: [['$', '$']], displayMath: [['$$', '$$']] },
                   options: { skipHtmlTags: ['script','noscript','style','textarea','pre','code'] } };
</script>
<script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
<style>
  :root { --bg:#0f172a; --panel:#1e293b; --line:#334155; --text:#e2e8f0; --dim:#94a3b8;
          --blue:#3b82f6; --green:#22c55e; --red:#ef4444; --amber:#f59e0b; --purple:#a78bfa; }
  * { box-sizing:border-box; }
  body { margin:0; font:14px/1.5 system-ui,Segoe UI,sans-serif; background:var(--bg); color:var(--text); }
  header { display:flex; align-items:center; gap:12px; padding:10px 16px; background:var(--panel);
           border-bottom:1px solid var(--line); position:sticky; top:0; z-index:10; }
  header h1 { font-size:16px; margin:0 12px 0 0; }
  button { background:var(--blue); border:0; color:#fff; padding:7px 14px; border-radius:8px;
           font-weight:600; cursor:pointer; font-size:13px; }
  button.secondary { background:var(--line); }
  button.danger { background:var(--red); }
  button:disabled { opacity:.5; cursor:default; }
  #gitInfo { margin-left:auto; color:var(--dim); font-size:12px; text-align:right; }
  .layout { display:flex; min-height:calc(100vh - 53px); }
  aside { width:300px; border-right:1px solid var(--line); padding:12px; flex-shrink:0; }
  main { flex:1; padding:16px 24px; min-width:0; }
  .paper { padding:10px 12px; border:1px solid var(--line); border-radius:10px; margin-bottom:8px;
           cursor:pointer; background:var(--panel); }
  .paper:hover, .paper.active { border-color:var(--blue); }
  .paper .t { font-weight:600; }
  .paper .m { color:var(--dim); font-size:12px; display:flex; gap:8px; flex-wrap:wrap; }
  .badge { padding:1px 7px; border-radius:99px; font-size:11px; font-weight:600; }
  .badge.v { background:#1d4ed8; color:#fff; }
  .badge.bump { background:var(--amber); color:#000; }
  .badge.new { background:var(--green); color:#000; }
  .badge.err { background:var(--red); color:#fff; }
  h2 { font-size:18px; } h3 { font-size:15px; color:var(--purple); margin:24px 0 8px; }
  .q { background:var(--panel); border:1px solid var(--line); border-radius:12px;
       padding:14px 16px; margin-bottom:12px; }
  .q .head { display:flex; gap:10px; align-items:center; margin-bottom:6px; }
  .q .id { font-weight:700; color:var(--blue); }
  .q .type { color:var(--dim); font-size:12px; }
  .q .marks { margin-left:auto; font-size:12px; color:var(--dim); }
  .q img { max-width:420px; max-height:260px; display:block; margin:8px 0;
           background:#fff; border-radius:8px; padding:4px; }
  .opt { padding:4px 10px; border-radius:8px; margin:3px 0; }
  .opt.correct { background:rgba(34,197,94,.15); border:1px solid rgba(34,197,94,.4); }
  .ans { color:var(--green); font-weight:600; }
  .exp { color:var(--dim); font-size:13px; margin-top:6px; border-top:1px dashed var(--line); padding-top:6px; }
  dialog { background:var(--panel); color:var(--text); border:1px solid var(--line);
           border-radius:14px; width:min(860px,92vw); padding:0; }
  dialog::backdrop { background:rgba(0,0,0,.6); }
  dialog .body { padding:16px 20px; }
  textarea { width:100%; min-height:380px; background:#0b1220; color:#d1e3ff; border:1px solid var(--line);
             border-radius:10px; padding:12px; font:13px/1.5 Consolas,monospace; resize:vertical; }
  .row { display:flex; gap:10px; align-items:center; margin-top:12px; }
  #jsonErr { color:var(--red); font-size:12px; flex:1; }
  #toast { position:fixed; bottom:18px; right:18px; background:var(--panel); border:1px solid var(--line);
           border-radius:10px; padding:12px 16px; max-width:480px; white-space:pre-wrap; display:none;
           font-size:13px; z-index:50; max-height:50vh; overflow:auto; }
  #toast.ok { border-color:var(--green); } #toast.bad { border-color:var(--red); }
  .metaGrid { display:grid; grid-template-columns:110px 1fr; gap:8px 12px; align-items:center; }
  .metaGrid input { background:#0b1220; color:var(--text); border:1px solid var(--line);
                    border-radius:8px; padding:7px 10px; width:100%; }
  .empty { color:var(--dim); margin-top:40px; text-align:center; }
</style>
</head>
<body>
<header>
  <h1>📚 JEE Paper Admin</h1>
  <button id="btnValidate" class="secondary">Validate all</button>
  <button id="btnCommit" class="secondary">Commit</button>
  <button id="btnPublish">Publish</button>
  <div id="gitInfo">loading git…</div>
</header>

<div class="layout">
  <aside id="paperList"></aside>
  <main id="content"><div class="empty">Select a paper to view its questions.</div></main>
</div>

<dialog id="editDlg">
  <div class="body">
    <h2 id="editTitle" style="margin-top:0"></h2>
    <textarea id="editArea" spellcheck="false"></textarea>
    <div class="row">
      <span id="jsonErr"></span>
      <button class="secondary" onclick="editDlg.close()">Cancel</button>
      <button id="btnSaveQ">Save question</button>
    </div>
  </div>
</dialog>

<dialog id="metaDlg">
  <div class="body">
    <h2 style="margin-top:0">Paper settings</h2>
    <div class="metaGrid">
      <label>Title</label><input id="mTitle">
      <label>Year</label><input id="mYear" type="number">
      <label>Description</label><input id="mDesc">
      <label>Version</label><input id="mVersion" type="number" min="1">
    </div>
    <div class="row" style="justify-content:flex-end">
      <button class="secondary" onclick="metaDlg.close()">Cancel</button>
      <button id="btnSaveMeta">Save settings</button>
    </div>
  </div>
</dialog>

<div id="toast"></div>

<script>
let papers = [], current = null, editing = null;

const $ = s => document.querySelector(s);
const esc = s => (s ?? '').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;');

function toast(msg, ok) {
  const t = $('#toast');
  t.textContent = msg;
  t.className = ok === undefined ? '' : ok ? 'ok' : 'bad';
  t.style.display = 'block';
  clearTimeout(t._h);
  t._h = setTimeout(() => t.style.display = 'none', ok === false ? 15000 : 6000);
}

async function api(path, opts) {
  const r = await fetch(path, opts);
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

async function refreshGit() {
  try {
    const g = await api('/api/git/status');
    const dirty = g.changes.length;
    const ahead = Object.entries(g.ahead)
      .map(([r,n]) => n === null ? `${r}:?` : `${r}:+${n}`).join('  ');
    $('#gitInfo').innerHTML =
      `branch <b>${esc(g.branch)}</b> · ${dirty ? `<span style="color:var(--amber)">${dirty} uncommitted</span>` : 'clean'} · unpushed ${esc(ahead)}`;
  } catch (e) { $('#gitInfo').textContent = 'git unavailable'; }
}

async function loadPapers() {
  papers = await api('/api/papers');
  const list = $('#paperList');
  list.innerHTML = '';
  for (const p of papers) {
    const d = document.createElement('div');
    d.className = 'paper' + (current && current.manifest.id === p.id ? ' active' : '');
    d.innerHTML = `<div class="t">${esc(p.title)}</div>
      <div class="m">
        <span>${p.year}</span>
        <span>${p.questionCount ?? '—'} questions</span>
        <span class="badge v">v${p.version ?? 1}</span>
        ${p.pendingBump ? '<span class="badge bump">bump pending</span>' : ''}
        ${!p.published ? '<span class="badge new">unpublished</span>' : ''}
        ${p.loadError ? '<span class="badge err">load error</span>' : ''}
      </div>`;
    d.onclick = () => openPaper(p.id);
    list.appendChild(d);
  }
}

function qBody(q, folder) {
  let html = `<div>${esc(q.questionText)}</div>`;
  if (q.hasImage && q.imageName)
    html += `<img src="/files/${folder}/${esc(q.imageName)}" alt="${esc(q.imageName)}"
              onerror="this.replaceWith(Object.assign(document.createElement('div'),{textContent:'⚠ missing image: ${esc(q.imageName)}',style:'color:var(--red)'}))">`;
  if (q.listI?.length) {
    html += '<div style="display:flex;gap:32px;margin:8px 0"><div><b>List-I</b>' +
      q.listI.map(i => `<div>${esc(i.id)}. ${esc(i.text)}</div>`).join('') +
      '</div><div><b>List-II</b>' +
      (q.listII||[]).map(i => `<div>${esc(i.id)}. ${esc(i.text)}</div>`).join('') + '</div></div>';
  }
  if (q.options?.length)
    html += q.options.map(o =>
      `<div class="opt ${o.isCorrect ? 'correct' : ''}">(${esc(o.id)}) ${esc(o.text)} ${o.isCorrect ? '✓' : ''}</div>`).join('');
  if (q.type === 'numerical')
    html += `<div class="ans">Answer: ${esc(q.answer)}</div>`;
  if (q.explanation)
    html += `<div class="exp">${esc(q.explanation)}</div>`;
  return html;
}

async function openPaper(id) {
  current = await api('/api/paper/' + id);
  const { paper, manifest, folder } = current;
  let html = `<div style="display:flex;align-items:center;gap:12px">
      <h2 style="margin:6px 0">${esc(paper.examTitle || manifest.title)}</h2>
      <button class="secondary" onclick="openMeta()">Settings</button>
    </div>
    <div style="color:var(--dim)">${esc(manifest.description)} · ${paper.durationMinutes} min · manifest v${manifest.version ?? 1}</div>`;
  const renderQs = (qs) => qs.map(q => `
    <div class="q">
      <div class="head">
        <span class="id">${esc(q.id)}</span><span class="type">${esc(q.type)}</span>
        <span class="marks">+${q.marks} / ${q.negativeMarks}</span>
        <button class="secondary" onclick='editQuestion(${JSON.stringify(q.id)})'>Edit</button>
      </div>${qBody(q, folder)}
    </div>`).join('');
  for (const s of paper.sections || []) {
    html += `<h3>${esc(s.name)}</h3>`;
    if (s.questions?.length) html += renderQs(s.questions);
    for (const sub of s.subsections || []) {
      html += `<h3 style="font-size:13px;color:var(--dim)">${esc(sub.name)}</h3>` + renderQs(sub.questions || []);
    }
  }
  $('#content').innerHTML = html;
  loadPapers();
  if (window.MathJax?.typesetPromise) MathJax.typesetPromise([$('#content')]);
}

function findQuestion(id) {
  for (const s of current.paper.sections || []) {
    for (const q of s.questions || []) if (q.id === id) return q;
    for (const sub of s.subsections || [])
      for (const q of sub.questions || []) if (q.id === id) return q;
  }
}

window.editQuestion = (id) => {
  editing = id;
  $('#editTitle').textContent = `Edit ${id} (${current.manifest.id})`;
  $('#editArea').value = JSON.stringify(findQuestion(id), null, 2);
  $('#jsonErr').textContent = '';
  editDlg.showModal();
};

$('#editArea').addEventListener('input', () => {
  try { JSON.parse($('#editArea').value); $('#jsonErr').textContent = ''; }
  catch (e) { $('#jsonErr').textContent = e.message; }
});

$('#btnSaveQ').onclick = async () => {
  let q;
  try { q = JSON.parse($('#editArea').value); }
  catch (e) { $('#jsonErr').textContent = e.message; return; }
  try {
    const r = await api(`/api/paper/${current.manifest.id}/question/${editing}`,
      { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(q) });
    editDlg.close();
    toast(r.bumpedVersion
      ? `Saved. Paper version auto-bumped to v${r.bumpedVersion} (published paper edited).`
      : 'Saved.', true);
    openPaper(current.manifest.id);
    refreshGit();
  } catch (e) { $('#jsonErr').textContent = e.message; }
};

window.openMeta = () => {
  const m = current.manifest;
  $('#mTitle').value = m.title; $('#mYear').value = m.year;
  $('#mDesc').value = m.description || ''; $('#mVersion').value = m.version ?? 1;
  metaDlg.showModal();
};

$('#btnSaveMeta').onclick = async () => {
  await api(`/api/paper/${current.manifest.id}/meta`, {
    method:'PUT', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ title:$('#mTitle').value, year:+$('#mYear').value,
                           description:$('#mDesc').value, version:+$('#mVersion').value })});
  metaDlg.close(); toast('Settings saved.', true);
  openPaper(current.manifest.id); refreshGit();
};

$('#btnValidate').onclick = async () => {
  toast('Validating…');
  const r = await api('/api/validate', { method:'POST' });
  toast(r.output.trim().split('\n').slice(-25).join('\n'), r.ok);
};

$('#btnCommit').onclick = async () => {
  const msg = prompt('Commit message (leave empty for auto-generated):', '');
  if (msg === null) return;
  const r = await api('/api/git/commit', { method:'POST',
    headers:{'Content-Type':'application/json'}, body: JSON.stringify({ message: msg }) });
  toast(r.ok ? `Committed: "${r.message}"` : r.output, r.ok);
  refreshGit();
};

$('#btnPublish').onclick = async () => {
  if (!confirm('Publish = push to ALL remotes (deploys to GitHub Pages). Continue?')) return;
  toast('Validating and pushing…');
  const r = await api('/api/git/publish', { method:'POST' });
  toast(r.output.trim(), r.ok);
  refreshGit();
};

loadPapers(); refreshGit();
setInterval(refreshGit, 20000);
</script>
</body>
</html>
